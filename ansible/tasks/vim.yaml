---
- name: Create config directory
  file:
    path: ~/.config/nvim
    state: directory

- name: Setup dotfiles
  file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  with_items:
    - src: '~/dotfiles/.vimrc'
      dest: '~/.vimrc'
    - src: '~/dotfiles/.vim'
      dest: '~/.vim'
    - src: '~/dotfiles/.config/nvim'
      dest: '~/.config/nvim'

- name: Create vim-plug directory
  file:
    state: directory
    path: "{{ item }}"
    mode: '755'
  with_items:
    - '~/.vim/autoload'
    - '~/.local/share/nvim/site/autoload'

- name: Install vim-plug
  get_url:
    url: "{{ item.url }}"
    dest: "{{ item.dest }}"
    mode: '644'
  with_items:
    - url: 'https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim'
      dest: '~/.vim/autoload/plug.vim'
    - url: 'https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim'
      dest: '~/.local/share/nvim/site/autoload/plug.vim'

- name: Update homebrew
  when: "ansible_os_family == 'Darwin'"
  homebrew:
    update_homebrew: 'yes'
    upgrade_all: 'no'

- name: Install vim and required packages for Mac
  when: "ansible_os_family == 'Darwin'"
  homebrew:
    name: "{{ item.name }}"
    install_options: "{{ item.options|default() }}"
  with_items:
    - name: vim
    - name: neovim
    - name: yamllint

- name: Install vim and required packages for Debian
  when: "ansible_os_family == 'Debian'"
  become: yes
  become_method: sudo
  apt:
    update_cache: yes
    cache_valid_time: 3600
    name:
      - vim-gtk
      - neovim
      - python3-neovim
      - yamllint

- name: Install pynvim in system python
  when: "ansible_os_family == 'Darwin'"
  shell: /usr/bin/pip3 install pynvim --user
  args:
    executable: /bin/bash

- name: Request installation of vim plugin
  debug:
    msg: ":PlugInstall"

